{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <a href="{{ url_for('qkd_app.home') }}" class="btn btn-sm btn-link mb-2"><i class="bi bi-arrow-left me-2"></i>Back to Dashboard</a>
        <h1 class="m-0">QKD Application Details</h1>
        <p class="text-muted">Application ID: <span class="mono-id">{{ app.app_id.app_uuid.uuid }}</span></p>
    </div>
    <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal">
        <i class="bi bi-trash me-2"></i> Delete Application
    </button>
</div>


<!-- Key Relay Path Visualization -->
<div class="card mb-4">
    <div class="card-header border-0 pb-0">
        <h6 class="m-0 text-uppercase small fw-bold text-muted"><i class="bi bi-diagram-2 me-2"></i>Secure Key Relay Path</h6>
    </div>
    <div class="card-body">
        <div class="timeline-container d-flex align-items-center justify-content-between py-5 px-4 overflow-auto">
            <!-- Source Node -->
            <div class="timeline-node">
                <div class="timeline-node-icon"><i class="bi bi-hdd-fill" style="color: var(--gcp-blue);"></i></div>
                <div class="timeline-node-label">Source</div>
                <div class="mono-id mt-2" style="font-size: 0.75rem;">qkd-src-1</div>
            </div>

            <div class="timeline-spacer flex-grow-1 mx-3">
                <div class="timeline-line"></div>
            </div>

            <!-- Relay #1 -->
            <div class="timeline-node">
                <div class="timeline-node-icon"><i class="bi bi-shield-fill" style="color: var(--success-green);"></i></div>
                <div class="timeline-node-label">Relay A</div>
                <span class="badge rounded-pill bg-success-subtle text-success border border-success-subtle mt-1" style="font-size: 0.6rem;">SECURE</span>
                <div class="mono-id mt-2" style="font-size: 0.75rem;">trusted-relay-A</div>
            </div>
            
            <div class="timeline-spacer flex-grow-1 mx-3">
                <div class="timeline-line quantum-line"></div>
            </div>

            <!-- Relay #2 -->
            <div class="timeline-node">
                <div class="timeline-node-icon"><i class="bi bi-shield-fill" style="color: var(--success-green);"></i></div>
                <div class="timeline-node-label">Relay B</div>
                <span class="badge rounded-pill bg-success-subtle text-success border border-success-subtle mt-1" style="font-size: 0.6rem;">SECURE</span>
                <div class="mono-id mt-2" style="font-size: 0.75rem;">trusted-relay-B</div>
            </div>

            <div class="timeline-spacer flex-grow-1 mx-3">
                <div class="timeline-line quantum-line"></div>
            </div>

            <!-- Destination Node -->
            <div class="timeline-node">
                <div class="timeline-node-icon"><i class="bi bi-hdd-fill" style="color: var(--success-green);"></i></div>
                <div class="timeline-node-label">Destination</div>
                <div class="mono-id mt-2" style="font-size: 0.75rem;">qkd-dst-1</div>
            </div>
        </div>
    </div>
</div>

<style>
.timeline-container {
    min-width: 600px;
}
.timeline-node {
    text-align: center;
    position: relative;
    z-index: 2;
}
.timeline-node-icon {
    font-size: 2rem;
    background-color: var(--bg-surface);
    width: 60px;
    height: 60px;
    line-height: 60px;
    border-radius: 50%;
    margin: 0 auto;
    border: 1px solid var(--border-color);
    transition: all 0.3s ease;
}
.timeline-node:hover .timeline-node-icon {
    border-color: var(--gcp-blue);
    transform: translateY(-2px);
}
.timeline-node-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-secondary);
    margin-top: 10px;
    letter-spacing: 0.5px;
}
.timeline-spacer {
    position: relative;
    height: 2px;
}
.timeline-line {
    height: 2px;
    background-color: var(--border-color);
    width: 100%;
}
.quantum-line {
    background: repeating-linear-gradient(to right, var(--border-color), var(--border-color) 10px, transparent 10px, transparent 20px);
}
.timeline-spacer::after {
    content: '';
    position: absolute;
    right: 0;
    top: -4px;
    width: 10px;
    height: 10px;
    border-top: 2px solid var(--border-color);
    border-right: 2px solid var(--border-color);
    transform: rotate(45deg);
}
</style>

{% endblock %}
