apiVersion: apps/v1
kind: Deployment
metadata:
  name: l3-centralizedattackdetectorservice
spec:
  selector:
    matchLabels:
      app: l3-centralizedattackdetectorservice
  template:
    metadata:
      labels:
        app: l3-centralizedattackdetectorservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: localhost:32000/tfs/l3_centralizedattackdetector:dev10
          imagePullPolicy: Always
          ports:
            - containerPort: 10001
            - containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: BATCH_SIZE
              value: "256"
            - name: CAD_CLASSIFICATION_THRESHOLD
              value: "0.5"
            - name: MONITORED_KPIS_TIME_INTERVAL_AGG
              value: "60"
            - name: TEST_ML_MODEL
              value: "0"
            - name: CONTEXTSERVICE_SERVICE_HOST
              value: "contextservice"
            - name: CONTEXTSERVICE_SERVICE_PORT_GRPC
              value: "1010"
            - name: MONITORINGSERVICE_SERVICE_HOST
              value: "monitoringservice"
            - name: MONITORINGSERVICE_SERVICE_PORT_GRPC
              value: "7070"
          readinessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:10001"]
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:10001"]
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: l3-centralizedattackdetectorservice
  labels:
    app: l3-centralizedattackdetectorservice
spec:
  type: ClusterIP
  selector:
    app: l3-centralizedattackdetectorservice
  ports:
    - name: metrics
      protocol: TCP
      port: 9192
      targetPort: 9192
    - name: grpc
      port: 10001
      targetPort: 10001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: l3-centralizedattackdetectorservice-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: l3-centralizedattackdetectorservice
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
