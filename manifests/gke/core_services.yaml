
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deviceservice
spec:
  selector:
    matchLabels:
      app: deviceservice
  template:
    metadata:
      labels:
        app: deviceservice
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      containers:
        - name: server
          image: us-central1-docker.pkg.dev/xg-ai-controller-77/xg-ai-images/deviceservice:v1-amd64
          imagePullPolicy: Always
          ports:
            - containerPort: 2020
            - containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
          envFrom:
            - secretRef:
                name: crdb-data
            - secretRef:
                name: nats-data
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: deviceservice
spec:
  selector:
    app: deviceservice
  ports:
    - name: grpc
      port: 2020
      targetPort: 2020
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceservice
spec:
  selector:
    matchLabels:
      app: serviceservice
  template:
    metadata:
      labels:
        app: serviceservice
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      containers:
        - name: server
          image: us-central1-docker.pkg.dev/xg-ai-controller-77/xg-ai-images/serviceservice:v1-amd64
          imagePullPolicy: Always
          ports:
            - containerPort: 3030
            - containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
          envFrom:
            - secretRef:
                name: crdb-data
            - secretRef:
                name: nats-data
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: serviceservice
spec:
  selector:
    app: serviceservice
  ports:
    - name: grpc
      port: 3030
      targetPort: 3030
