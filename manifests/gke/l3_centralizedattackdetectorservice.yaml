# xG-AI Cloud Deployment - Cybersecurity CAD Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: l3-centralizedattackdetectorservice
spec:
  selector:
    matchLabels:
      app: l3-centralizedattackdetectorservice
  template:
    metadata:
      labels:
        app: l3-centralizedattackdetectorservice
    spec:
      terminationGracePeriodSeconds: 5
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      containers:
        - name: server
          image: us-central1-docker.pkg.dev/xg-ai-controller-77/xg-ai-images/l3-centralizedattackdetectorservice:v1-amd64
          imagePullPolicy: Always
          ports:
            - containerPort: 10001
            - containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: BATCH_SIZE
              value: "10"
            - name: CAD_CLASSIFICATION_THRESHOLD
              value: "0.5"
            - name: MONITORED_KPIS_TIME_INTERVAL_AGG
              value: "60"
            - name: TEST_ML_MODEL
              value: "0"
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: l3-centralizedattackdetectorservice
  labels:
    app: l3-centralizedattackdetectorservice
spec:
  type: ClusterIP
  selector:
    app: l3-centralizedattackdetectorservice
  ports:
    - name: metrics
      protocol: TCP
      port: 9192
      targetPort: 9192
    - name: grpc
      port: 10001
      targetPort: 10001
