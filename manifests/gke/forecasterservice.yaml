# xG-AI Cloud Deployment - Forecaster Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecasterservice
spec:
  selector:
    matchLabels:
      app: forecasterservice
  template:
    metadata:
      labels:
        app: forecasterservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: us-central1-docker.pkg.dev/xg-ai-controller-77/xg-ai-images/forecasterservice:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 1010
            - containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: forecasterservice
  labels:
    app: forecasterservice
spec:
  type: ClusterIP
  selector:
    app: forecasterservice
  ports:
    - name: grpc
      protocol: TCP
      port: 1010
      targetPort: 1010
    - name: metrics
      protocol: TCP
      port: 9192
      targetPort: 9192
